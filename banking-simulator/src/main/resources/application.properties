# Database Configuration - In-Memory (Most stable for your presentation)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Custom Properties
banking.alert.email-enabled=false
banking.alert.low-balance-threshold=500.00
banking.reports.output-dir=reports/

# Server Configuration
server.port=8081

# DevTools (Allows auto-restart)
spring.devtools.restart.enabled=true

# Actuator
management.endpoints.web.exposure.include=*