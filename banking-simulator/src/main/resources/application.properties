# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/bankingdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl-auto (update creates tables if they don't exist, but doesn't drop them on exit)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Email (set email-enabled=true only when you have SMTP config)
banking.alert.email-enabled=false
banking.alert.low-balance-threshold=500.00
banking.reports.output-dir=reports/
