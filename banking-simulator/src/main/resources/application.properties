spring.datasource.url=jdbc:h2:mem:bankingdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Email (set email-enabled=true only when you have SMTP config)
banking.alert.email-enabled=false
banking.alert.low-balance-threshold=500.00
banking.reports.output-dir=reports/
